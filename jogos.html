<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos - Tancredo Destroyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #0f0f1a; color: white; overflow-x: hidden; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .admin-modal, .auth-modal { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); }
        .text-glow { text-shadow: 0 0 10px rgba(233, 69, 96, 0.5); }
        .tab-btn.active { border-bottom: 3px solid #e94560; color: #e94560; }
        .crown-active { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0f0f1a] sticky top-0 z-40">
        <div class="flex items-center gap-6">
            <a href="#" class="font-gaming text-[#e94560] text-xl tracking-tighter hover:opacity-80 transition">
                <i class="fas fa-bolt mr-2"></i> TANCREDO DESTROYER
            </a>
        </div>

        <div class="flex items-center gap-4">
            <button id="adminBtn" onclick="handleAdminAccess()" class="text-gray-400 hover:text-white transition text-xs font-gaming hidden md:block">
                PAINEL ADMIN <i class="fas fa-cog ml-1"></i>
            </button>
            <div id="userArea" class="flex items-center gap-3"></div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <h2 class="font-gaming text-3xl md:text-5xl text-center mb-16 text-glow uppercase tracking-widest">Biblioteca de Jogos</h2>
        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <!-- Modal de Admin -->
    <div id="adminModal" class="fixed inset-0 admin-modal hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#1a1a2e] border border-gray-700 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
            
            <div id="adminLogin" class="p-8 text-center">
                <h3 class="font-gaming text-xl mb-6 text-[#e94560]">Acesso Restrito</h3>
                <input type="password" id="adminSecretInput" placeholder="Senha ADM" class="bg-[#0f0f1a] border border-gray-600 p-4 rounded-lg mb-6 outline-none focus:border-[#e94560] text-center w-full max-w-xs block mx-auto tracking-widest">
                <div class="flex gap-3 justify-center">
                    <button onclick="verifyAdmin()" class="bg-[#e94560] px-8 py-3 rounded-lg font-bold hover:bg-[#ff4d6d]">ENTRAR</button>
                    <button onclick="closeAdmin()" class="border border-gray-600 px-8 py-3 rounded-lg hover:bg-gray-800">FECHAR</button>
                </div>
            </div>

            <div id="adminPanel" class="hidden flex flex-col h-full">
                <div class="flex bg-[#0f0f1a] p-2 gap-1 overflow-x-auto border-b border-gray-800">
                    <button onclick="setAdminTab('add')" id="adminTabAdd" class="px-4 py-3 font-gaming text-[10px] rounded-lg">NOVO JOGO</button>
                    <button onclick="setAdminTab('manage')" id="adminTabManage" class="px-4 py-3 font-gaming text-[10px] rounded-lg hover:bg-white/5">GERENCIAR</button>
                    <button onclick="setAdminTab('users')" id="adminTabUsers" class="px-4 py-3 font-gaming text-[10px] rounded-lg hover:bg-white/5">USUÁRIOS</button>
                    <button onclick="checkMasterAccess()" id="adminTabMaster" class="px-4 py-3 font-gaming text-[10px] rounded-lg text-red-400 border border-red-500/20">ARQUIVOS MESTRES</button>
                    <button onclick="closeAdmin()" class="ml-auto px-4 py-3 text-gray-500"><i class="fas fa-times"></i></button>
                </div>

                <div class="flex-1 overflow-y-auto p-6">
                    <!-- Aba Usuários -->
                    <div id="panelUsers" class="hidden">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-gray-500 uppercase border-b border-gray-800">
                                <tr>
                                    <th class="p-3 w-10">MOD</th>
                                    <th class="p-3">NOME</th>
                                    <th class="p-3 text-right">AÇÕES</th>
                                </tr>
                            </thead>
                            <tbody id="adminUsersList"></tbody>
                        </table>
                    </div>

                    <!-- Aba Arquivos Mestres -->
                    <div id="panelMaster" class="hidden space-y-6">
                        <div class="p-8 bg-red-900/5 border border-red-500/20 rounded-2xl text-center">
                            <i class="fas fa-cloud-upload-alt text-4xl text-[#e94560] mb-4"></i>
                            <h4 class="font-gaming text-lg text-white mb-2">GOOGLE DRIVE SYNC</h4>
                            
                            <div id="googleConfig" class="mb-6 max-w-sm mx-auto">
                                <p class="text-[10px] text-gray-500 mb-2 uppercase">Configuração de Desenvolvedor</p>
                                <input type="text" id="googleClientId" placeholder="Cole seu Google Client ID aqui" class="w-full bg-black border border-gray-700 p-2 rounded text-[10px] text-white outline-none focus:border-[#e94560] mb-4">
                                <button onclick="saveGoogleConfig()" class="text-[10px] bg-gray-800 px-4 py-1 rounded hover:bg-gray-700">SALVAR CONFIG</button>
                            </div>

                            <div id="googleProfile" class="hidden mb-6 bg-black/40 p-4 rounded-xl border border-gray-700 flex items-center justify-between text-left">
                                <div class="flex items-center gap-3">
                                    <img id="googleImg" src="" class="w-10 h-10 rounded-full border border-[#e94560]">
                                    <div>
                                        <p id="googleName" class="text-sm font-bold"></p>
                                        <p id="googleEmail" class="text-[10px] text-gray-500"></p>
                                    </div>
                                </div>
                                <span class="text-[9px] px-2 py-1 rounded bg-green-500/20 text-green-400 font-bold">ATIVO</span>
                            </div>

                            <div class="flex flex-col gap-3 max-w-xs mx-auto">
                                <button id="btnGoogleConnect" onclick="startGoogleAuth()" class="w-full py-4 bg-white text-black rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-4 h-4">
                                    CONECTAR GOOGLE DRIVE
                                </button>
                                <div id="syncControls" class="hidden flex flex-col gap-3">
                                    <button onclick="manualBackup()" class="w-full py-4 bg-[#e94560] text-white rounded-xl font-bold text-xs">SINCRONIZAR AGORA</button>
                                    <button onclick="disconnectGoogle()" class="text-xs text-gray-500 underline">Desconectar</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="panelAdd" class="space-y-4">
                         <input type="text" id="gameName" placeholder="Nome do Jogo" class="w-full bg-[#0f0f1a] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#e94560]">
                         <input type="text" id="gameBanner" placeholder="URL da Capa" class="w-full bg-[#0f0f1a] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#e94560]">
                         <input type="text" id="gameUrl" placeholder="URL do Jogo" class="w-full bg-[#0f0f1a] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#e94560]">
                         <button onclick="saveGame()" class="w-full bg-[#e94560] py-4 rounded-lg font-gaming text-sm">CRIAR JOGO</button>
                    </div>
                    
                    <div id="panelManage" class="hidden space-y-2">
                        <div id="adminGamesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Login -->
    <div id="authModal" class="fixed inset-0 auth-modal hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#1a1a2e] border border-gray-700 p-8 rounded-2xl w-full max-w-md">
            <h3 class="font-gaming text-center mb-6">Login / Cadastro</h3>
            <input type="text" id="authUser" placeholder="Usuário" class="w-full bg-[#0f0f1a] border border-gray-700 p-3 rounded-lg mb-3">
            <input type="password" id="authPass" placeholder="Senha" class="w-full bg-[#0f0f1a] border border-gray-700 p-3 rounded-lg mb-6">
            <button onclick="handleUserAuth()" class="w-full bg-[#e94560] py-3 rounded-lg font-bold font-gaming text-xs">CONFIRMAR</button>
            <button onclick="closeAuth()" class="w-full mt-4 text-gray-500 text-xs">VOLTAR</button>
        </div>
    </div>

    <script>
        const DB_NAME = "TancredoDB";
        const STORES = { GAMES: "games", USERS: "users", SAVES: "saves" };
        const ADMIN_PASS = "qwertyuiop";
        const MASTER_PASS = "qwertyuiop1234567890";
        
        let db;
        let currentUser = JSON.parse(localStorage.getItem('td_session')) || null;
        let googleToken = null;
        let googleClientId = localStorage.getItem('google_client_id') || "";

        // --- DATABASE ---
        const req = indexedDB.open(DB_NAME, 3);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if(!d.objectStoreNames.contains(STORES.GAMES)) d.createObjectStore(STORES.GAMES, { keyPath: "id", autoIncrement: true });
            if(!d.objectStoreNames.contains(STORES.USERS)) d.createObjectStore(STORES.USERS, { keyPath: "username" });
            if(!d.objectStoreNames.contains(STORES.SAVES)) d.createObjectStore(STORES.SAVES, { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = (e) => {
            db = e.target.result;
            renderGames();
            updateUserUI();
            if(googleClientId) document.getElementById('googleClientId').value = googleClientId;
        };

        function saveGoogleConfig() {
            googleClientId = document.getElementById('googleClientId').value.trim();
            localStorage.setItem('google_client_id', googleClientId);
            alert("Configuração salva! Você já pode tentar conectar.");
        }

        // --- GOOGLE DRIVE ---
        function startGoogleAuth() {
            if(!googleClientId) return alert("Por favor, insira o Client ID do Google primeiro nas configurações acima.");
            
            const client = google.accounts.oauth2.initTokenClient({
                client_id: googleClientId,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                callback: (response) => {
                    if (response.access_token) {
                        googleToken = response.access_token;
                        fetchGoogleProfile(googleToken);
                    }
                },
            });
            client.requestAccessToken();
        }

        async function fetchGoogleProfile(token) {
            try {
                const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const profile = await res.json();
                document.getElementById('googleProfile').classList.remove('hidden');
                document.getElementById('googleImg').src = profile.picture;
                document.getElementById('googleName').innerText = profile.name;
                document.getElementById('googleEmail').innerText = profile.email;
                document.getElementById('btnGoogleConnect').classList.add('hidden');
                document.getElementById('syncControls').classList.remove('hidden');
                autoSaveToCloud();
            } catch (err) { console.error(err); }
        }

        function disconnectGoogle() {
            googleToken = null;
            document.getElementById('googleProfile').classList.add('hidden');
            document.getElementById('btnGoogleConnect').classList.remove('hidden');
            document.getElementById('syncControls').classList.add('hidden');
        }

        async function autoSaveToCloud() {
            if (!googleToken) return;
            const data = {
                games: await getAllFromStore(STORES.GAMES),
                users: await getAllFromStore(STORES.USERS),
                saves: await getAllFromStore(STORES.SAVES),
                date: new Date().toISOString()
            };
            console.log("Sincronizando...", data);
        }

        function getAllFromStore(storeName) {
            return new Promise(resolve => {
                const list = [];
                db.transaction([storeName], "readonly").objectStore(storeName).openCursor().onsuccess = e => {
                    const cursor = e.target.result;
                    if(cursor) { list.push(cursor.value); cursor.continue(); }
                    else resolve(list);
                };
            });
        }

        // --- ADMIN & CROWN ---
        function handleAdminAccess() {
            if (currentUser && currentUser.isCrown) {
                document.getElementById('adminModal').classList.remove('hidden');
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                setAdminTab('add');
            } else {
                openAdmin();
            }
        }

        function openAdmin() {
            document.getElementById('adminModal').classList.remove('hidden');
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        }

        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        function verifyAdmin() {
            if (document.getElementById('adminSecretInput').value === ADMIN_PASS) {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                setAdminTab('add');
            } else { alert("Senha Errada"); }
        }

        function checkMasterAccess() {
            const p = prompt("SENHA ARQUIVOS MESTRES:");
            if(p === MASTER_PASS) setAdminTab('master');
            else alert("Acesso Negado");
        }

        function setAdminTab(tab) {
            ['add', 'manage', 'users', 'master'].forEach(t => {
                document.getElementById(`panel${t.charAt(0).toUpperCase()+t.slice(1)}`)?.classList.add('hidden');
                document.getElementById(`adminTab${t.charAt(0).toUpperCase()+t.slice(1)}`)?.classList.remove('bg-[#e94560]');
            });
            document.getElementById(`panel${tab.charAt(0).toUpperCase()+tab.slice(1)}`).classList.remove('hidden');
            document.getElementById(`adminTab${tab.charAt(0).toUpperCase()+tab.slice(1)}`).classList.add('bg-[#e94560]');
            if(tab === 'users') loadAdminUsers();
            if(tab === 'manage') loadAdminGames();
        }

        function loadAdminUsers() {
            const tbody = document.getElementById('adminUsersList');
            tbody.innerHTML = '';
            db.transaction([STORES.USERS], "readonly").objectStore(STORES.USERS).openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const u = cursor.value;
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-800 text-xs">
                            <td class="p-3 text-center">
                                <button onclick="toggleCrown('${u.username}')">
                                    <i class="fas fa-crown ${u.isCrown ? 'crown-active' : 'text-gray-700'}"></i>
                                </button>
                            </td>
                            <td class="p-3 font-bold">${u.username}</td>
                            <td class="p-3 text-right">
                                <button onclick="deleteUser('${u.username}')" class="text-red-500">Deletar</button>
                            </td>
                        </tr>
                    `;
                    cursor.continue();
                }
            };
        }

        function toggleCrown(username) {
            const tx = db.transaction([STORES.USERS], "readwrite");
            const store = tx.objectStore(STORES.USERS);
            store.get(username).onsuccess = (e) => {
                const user = e.target.result;
                user.isCrown = !user.isCrown;
                store.put(user).onsuccess = () => {
                    if (currentUser && currentUser.username === username) {
                        currentUser.isCrown = user.isCrown;
                        localStorage.setItem('td_session', JSON.stringify(currentUser));
                        updateUserUI();
                    }
                    loadAdminUsers();
                    autoSaveToCloud();
                };
            };
        }

        function deleteUser(username) {
            if(confirm("Remover usuário?")) {
                db.transaction([STORES.USERS], "readwrite").objectStore(STORES.USERS).delete(username).onsuccess = () => {
                    loadAdminUsers();
                    autoSaveToCloud();
                };
            }
        }

        // --- GAMES ---
        function saveGame() {
            const name = document.getElementById('gameName').value;
            const banner = document.getElementById('gameBanner').value;
            const url = document.getElementById('gameUrl').value;
            if(!name || !banner || !url) return alert("Preencha tudo");

            const tx = db.transaction([STORES.GAMES], "readwrite");
            tx.objectStore(STORES.GAMES).add({ name, banner, url });
            tx.oncomplete = () => {
                renderGames();
                autoSaveToCloud();
                setAdminTab('manage');
            };
        }

        function loadAdminGames() {
            const div = document.getElementById('adminGamesList');
            div.innerHTML = '';
            db.transaction([STORES.GAMES], "readonly").objectStore(STORES.GAMES).openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const g = cursor.value;
                    div.innerHTML += `
                        <div class="flex justify-between items-center bg-[#0f0f1a] p-3 rounded-lg border border-gray-800">
                            <span class="text-xs uppercase">${g.name}</span>
                            <button onclick="deleteGame(${g.id})" class="text-red-500 text-[10px]">DELETAR</button>
                        </div>
                    `;
                    cursor.continue();
                }
            };
        }

        function deleteGame(id) {
            if(confirm("Remover jogo?")) {
                db.transaction([STORES.GAMES], "readwrite").objectStore(STORES.GAMES).delete(id).onsuccess = () => {
                    loadAdminGames();
                    renderGames();
                    autoSaveToCloud();
                };
            }
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            db.transaction([STORES.GAMES], "readonly").objectStore(STORES.GAMES).openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const g = cursor.value;
                    grid.innerHTML += `
                        <div class="bg-[#1a1a2e] rounded-xl overflow-hidden border border-gray-800 group transition hover:border-[#e94560]">
                            <img src="${g.banner}" class="w-full aspect-video object-cover">
                            <div class="p-4 flex justify-between items-center">
                                <span class="text-xs font-bold uppercase truncate">${g.name}</span>
                                <button onclick="window.open('${g.url}')" class="w-8 h-8 bg-[#e94560] rounded-full flex items-center justify-center"><i class="fas fa-play text-[10px]"></i></button>
                            </div>
                        </div>
                    `;
                    cursor.continue();
                }
            };
        }

        // --- AUTH ---
        function openAuth() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('authModal').classList.add('hidden'); }
        
        function handleUserAuth() {
            const u = document.getElementById('authUser').value;
            const p = document.getElementById('authPass').value;
            if(!u || !p) return;

            const tx = db.transaction([STORES.USERS], "readwrite");
            const store = tx.objectStore(STORES.USERS);
            store.get(u).onsuccess = (e) => {
                const user = e.target.result;
                if(user) {
                    if(user.password === p) login(user);
                    else alert("Senha Incorreta");
                } else {
                    const newUser = { username: u, password: p, isCrown: false };
                    store.add(newUser);
                    login(newUser);
                }
            };
        }

        function login(user) {
            currentUser = user;
            localStorage.setItem('td_session', JSON.stringify(user));
            updateUserUI();
            closeAuth();
            autoSaveToCloud();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('td_session');
            updateUserUI();
        }

        function updateUserUI() {
            const area = document.getElementById('userArea');
            if(currentUser) {
                area.innerHTML = `
                    <div class="flex items-center gap-3 bg-gray-800/40 p-1 pr-4 rounded-full border border-gray-700">
                        <div class="w-8 h-8 bg-[#e94560] rounded-full flex items-center justify-center font-bold text-xs relative">
                            ${currentUser.username[0].toUpperCase()}
                            ${currentUser.isCrown ? '<i class="fas fa-crown absolute -top-1 -right-1 text-[8px] text-yellow-400"></i>' : ''}
                        </div>
                        <span class="text-[10px] font-bold uppercase">${currentUser.username}</span>
                        <button onclick="logout()" class="text-gray-500 hover:text-white"><i class="fas fa-power-off text-xs"></i></button>
                    </div>
                `;
            } else {
                area.innerHTML = `<button onclick="openAuth()" class="bg-[#e94560] px-6 py-2 rounded-lg font-gaming text-xs">LOG IN</button>`;
            }
        }

        function manualBackup() {
            if(!googleToken) return alert("Conecte ao Google primeiro");
            autoSaveToCloud();
            alert("Sincronizado com Sucesso!");
        }
    </script>
</body>
</html>
